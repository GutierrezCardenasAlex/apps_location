server {
    listen 80;
    server_name maps.cybernovatech.space;

    client_max_body_size 100m;
    resolver 127.0.0.11 ipv6=off valid=30s;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /route/ {
        set $osrm http://osrm:5000;
        proxy_pass $osrm/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /maps/styles/basic-preview/style.json {
        alias /etc/nginx/map-styles/basic-preview/style.json;
        add_header Cache-Control "public, max-age=60";
    }

    location /osrm/ {
        set $osrm http://osrm:5000;
        proxy_pass $osrm/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /maps/ {
        set $tileserver http://tileserver:8080;
        proxy_pass $tileserver/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
